name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: tiendaweb
  ECS_SERVICE: Definicion-de-tareas-Web1
  ECS_CLUSTER: cluster1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Obtener codigo
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Construir imagen Docker
      run: docker build -t $ECR_REPOSITORY .

    - name: Etiquetar imagen Docker
      run: |
        docker tag $ECR_REPOSITORY:latest \
        149993859814.dkr.ecr.eu-west-1.amazonaws.com/tiendaweb:latest

    - name: Subir imagen a ECR
      run: docker push 149993859814.dkr.ecr.eu-west-1.amazonaws.com/tiendaweb:latest

    - name: Actualizar servicio ECS
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment